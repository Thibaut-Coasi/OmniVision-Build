name: build
on: push
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: buildozer action
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
      - name: run buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: android debug
