name: build
on: push
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
          buildozer --version
      - name: build apk
        run: buildozer android debug
